services:
  db:
    image: postgres:16-alpine
    container_name: constructx_db
    environment:
      POSTGRES_USER: constructx
      POSTGRES_PASSWORD: constructx
      POSTGRES_DB: constructx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constructx -d constructx"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: constructx_api
    environment:
      DATABASE_URL: postgresql+psycopg://constructx:constructx@db:5432/constructx
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Source is baked into the image; mount for live-reload during development:
    volumes:
      - ./backend/app:/code/app:ro
      - ./backend/data:/code/data:ro

volumes:
  pgdata:
